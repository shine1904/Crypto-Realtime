type Query {
    # Query cũ lấy 1 con
    getCryptoPrice(symbol: String!): CryptoPrice @field(resolver: "App\\GraphQL\\Queries\\CryptoPriceResolver")

    # Query mới lấy cả danh sách cho Dashboard
    getCryptoPrices(symbols: [String!]!): [CryptoPrice] @field(resolver: "App\\GraphQL\\Queries\\CryptoPriceBatchResolver")
}

type CryptoPrice {
    symbol: String!
    price: Float
    change_24h: Float
}